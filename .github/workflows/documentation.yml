name: Build Docs

on: [push, pull_request]

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
        contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: |
          uv sync
      - name: Sphinx build
        run: |
          uv run sphinx-build -M html docs/ docs/_build/ 2>&1 | tee sphinx-build.log
      - name: Extract build summary
        id: build-summary
        run: |
          line=$(grep -E 'build succeeded.*' sphinx-build.log | tail -1 || true)
          echo "${line:-build output line not found}" > build-summary.txt
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat build-summary.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Comment build summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('build-summary.txt', 'utf8').trim();
            const body = `## Docs build summary\n\n\`\`\`\n${summary}\n\`\`\``;
            const commentMarker = '<!-- docs-build-summary -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.body?.includes(commentMarker));
            const fullBody = body + '\n' + commentMarker;
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
      - name: Upload docs build
        uses: actions/upload-artifact@v4
        with:
          name: docs-build
          path: docs/_build/

  test:
    needs: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: |
          uv sync
      - name: Download docs build
        uses: actions/download-artifact@v4
        with:
          name: docs-build
          path: docs/_build/
      - name: Run tests
        run: |
          uv run pytest tests/ -v
