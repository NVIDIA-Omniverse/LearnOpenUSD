# the eks-docker tag tells gitlab to run on "runners" owned by omniverse
image: ubuntu:16.04

# this runs before each job's 'script'
before_script:
  - apt update
  - apt install -y curl
  - curl -LsSf https://astral.sh/uv/install.sh | sh
  - uv sync

pages:
  stage: deploy
  script:
    - ./repo docs
    - mkdir public
    - cp -ar docs/build/html/* public
  tags:
    - eks-docker
  artifacts:
    paths:
      - public
  only:
    - main


